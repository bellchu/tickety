apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tickety
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: tickety-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8000"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://backend-service:8000"
        # Server-only runtime env for the /api proxy route handler.
        # NEXT_PUBLIC_* vars are inlined at build time and ignore pod env, so
        # the route handler reads this non-public var at request time instead.
        - name: BACKEND_URL
          value: "http://backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tickety
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000